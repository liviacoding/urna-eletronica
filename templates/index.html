<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votação</title>
    <style>
        body {
             
             background-color: beige;
           
            flex-direction: column;
            align-items: center;
            text-align: center;
           
            font-family:Georgia, 'Times New Roman', Times, serif;
            display: flex;
            margin: 0;
            gap: 100px;
            justify-content: center;
           background-image: url("/static/imagens/badeirab.jpeg");
           background-size: cover;
           background-position: center;
           background-repeat: no-repeat;
           background-attachment: fixed;
            
        }
        h1{
            color: rgb(128, 241, 138);
            font-size: 450%;
            margin: 0%;
            text-align: center;
        }
        h2{
            font-size: 250%;
            margin: 0;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
           
        }
        input{
            width:180px;
            height: 50px;
            cursor: pointer;
            font-size: 100%;
            

        }
        button {
           width: 180px;
           height: 50px;
           font-size: 120%;
           font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
           background-color: black;
           color: rgb(245, 242, 242);
        

        }
        button:hover{
            background-color: rgb(13, 13, 110);
            
        }
        .sister{
            background-color: rgb(7, 7, 7);
            width: 100%;
            height: 170px;
            font-size: 180%;

        }
        .irma{
            background-color: white;
            padding: 150px;
            width:400px;
            height: 380px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(17, 17, 17, 0.8);
            margin-top: -50px;
        }
        .irma h2{
            font-size:50px;
            font-family:'Times New Roman', Times, serif

        }
        .irma p{
            font-size: 15px;
            margin-top: 50px;

        }
        .irma div{
            text-align: center;
            background-color: rgb(177, 189, 9);
            width: 500px;
            height: 80px;
            margin-left: -60px;
            margin-top: -119px;
            border-radius: 10px;
            padding: 6px;
           
            
            

        }
        .irma h4{

            font-size: 20px;

        }
        
        
       
    </style>
</head>
<body>
    <div class="sister">
    <h1>Urna Eletrônica</h1>
    </div>

    <div class="irma">
        <div>
        <h2>Sistema de Votação</h2>
        </div>
        <p> Para Votar em seu candidato digite apenas o numero escolhido: </p>
        <h4>Maria  (1) | João (2) | Ana Julia (3):</h4>

        {% if erro %}
            <p style="color: red;"><strong>{{erro}}</strong></p>
        {% endif %}

        <form action="/votar" method="post"> 
            <input type="number"name="voto_usuario"placeholder="Número do Candidato:">
            <br>
            <p>Para encerrar a votação Digite (0)</p>
            <button type="submit">CONFIRMAR VOTO</button>
    </div>
        </form>
</body>
</html>
